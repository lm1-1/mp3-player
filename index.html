<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="MP3 听力播放器 - 支持倍速播放与精准快进后退">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <title>MP3 听力播放器</title>
</head>
<body>

  <div class="app-container">

    <!-- 顶部：文件夹选择 -->
    <header class="toolbar">
      <button id="btnSelectFolder" class="btn btn-folder">
        <span class="icon">📁</span>
        <span id="folderLabel">选择文件夹</span>
      </button>
    </header>

    <!-- 当前播放信息 -->
    <section class="now-playing">
      <div id="currentFile" class="current-file">未选择文件</div>
    </section>

    <!-- 播放控制区 -->
    <section class="player-controls">

      <!-- 进度条 -->
      <div class="progress-area">
        <input type="range" id="progressBar" class="progress-bar" min="0" max="100" value="0" step="0.1">
        <div class="time-display">
          <span id="currentTime" class="time">00:00</span>
          <span id="totalTime" class="time">00:00</span>
        </div>
      </div>

      <!-- 主控制按钮 -->
      <div class="main-buttons">
        <button id="btnSkipBack" class="btn btn-circle" title="后退">
          <span class="icon">⏪</span>
        </button>
        <button id="btnPlayPause" class="btn btn-circle btn-play" title="播放/暂停">
          <span id="playIcon" class="icon play-icon">▶️</span>
        </button>
        <button id="btnSkipForward" class="btn btn-circle" title="快进">
          <span class="icon">⏩</span>
        </button>
      </div>

      <!-- 步长选择 -->
      <div class="step-section">
        <label class="step-label">后退步长</label>
        <div class="step-group" id="stepGroupBack">
          <button class="btn btn-step" data-step="2">2s</button>
          <button class="btn btn-step" data-step="4">4s</button>
          <button class="btn btn-step" data-step="8">8s</button>
          <button class="btn btn-step active" data-step="16">16s</button>
        </div>
      </div>

      <div class="step-section">
        <label class="step-label">快进步长</label>
        <div class="step-group" id="stepGroupForward">
          <button class="btn btn-step" data-step="2">2s</button>
          <button class="btn btn-step" data-step="4">4s</button>
          <button class="btn btn-step" data-step="8">8s</button>
          <button class="btn btn-step active" data-step="16">16s</button>
        </div>
      </div>

      <!-- 倍速选择 -->
      <div class="speed-section">
        <label class="step-label">播放速度</label>
        <div class="speed-group" id="speedGroup">
          <button class="btn btn-speed" data-rate="0.5">0.5x</button>
          <button class="btn btn-speed" data-rate="0.75">0.75x</button>
          <button class="btn btn-speed active" data-rate="1">1x</button>
          <button class="btn btn-speed" data-rate="1.5">1.5x</button>
        </div>
      </div>

    </section>

    <!-- 文件列表 -->
    <section class="file-list-section">
      <h2 class="file-list-title">文件列表</h2>
      <div id="fileList" class="file-list">
        <div class="file-list-empty">请先选择一个文件夹</div>
      </div>
    </section>

  </div>

  <script src="js/player.js"></script>
  <script src="js/app.js"></script>
  <script>
    // 注册 Service Worker（PWA 离线支持）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    }
  </script>
</body>
</html>
